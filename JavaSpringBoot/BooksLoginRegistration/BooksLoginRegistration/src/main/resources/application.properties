spring.application.name=BooksLoginRegistration

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/books_login_registration?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JSP configuration
spring.mvc.view.prefix=/WEB-INF/
spring.mvc.view.suffix=.jsp

# Allows HTML forms to send PUT and DELETE using _method.
spring.mvc.hiddenmethod.filter.enabled=true

server.port=8080
